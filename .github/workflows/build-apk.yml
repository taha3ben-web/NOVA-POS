name: Build Nova POS APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0
          
      - name: Download Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
          unzip -q gradle-7.5-bin.zip
          echo "$(pwd)/gradle-7.5/bin" >> $GITHUB_PATH
          
      - name: Generate Wrapper with Gradle 7.5
        run: |
          gradle wrapper --gradle-version 7.5
          
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovaPOS-APK
          path: app/build/outputs/apk/debug/app-debug.apk
